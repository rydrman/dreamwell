name: CI

# PR pushes fire pull_request (synchronize) only — not push — so one run per commit.
# disabled for now to avoid using up minutes
on:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  TRUNK_VERSION: v0.21.14

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.86.0
          components: rustfmt, clippy
          targets: wasm32-unknown-unknown

      # Cache cargo registry + target before any builds (including trunk wasm artifacts).
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: dreamwell
          cache-on-failure: true

      - name: rustfmt
        run: make fmt-check

      # Download prebuilt trunk binary (~seconds) instead of `cargo install` (~minutes).
      - uses: jetli/trunk-action@v0.5.1
        with:
          version: ${{ env.TRUNK_VERSION }}

      - name: clippy
        run: make clippy

      - name: test
        run: make test

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: e2e
        run: |
          npx --prefix e2e playwright install chromium
          make e2e

      - name: build
        run: make build-front

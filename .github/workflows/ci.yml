name: CI

on:
  pull_request:
  push:
    branches-ignore:
      - main

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.86.0
          components: rustfmt, clippy
          targets: wasm32-unknown-unknown

      - name: Install trunk
        run: cargo install trunk --locked

      - uses: Swatinem/rust-cache@v2

      - name: rustfmt
        run: make fmt-check

      - name: clippy
        run: make clippy

      - name: test
        run: make test

      - name: build
        run: make build
